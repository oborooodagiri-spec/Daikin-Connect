name: daikin_connect_mobile
description: "Daikin Connect Enterprise Mobile App - Monitoring and Field Reporting."
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.3.3
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.6
  provider: ^6.1.1
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  animate_do: ^3.0.2
  intl: ^0.18.1
  mobile_scanner: ^4.0.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/favicon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#001529"
  image: "assets/images/daikin_logo.png"
  branding: "assets/images/logo_epl_connect_1.png"
  android_12:
    color: "#001529"
    icon_background_color: "#001529"
    image: "assets/images/daikin_logo.png"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
